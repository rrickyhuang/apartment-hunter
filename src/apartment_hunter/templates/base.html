<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Apartment Hunter{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    .status-pill { @apply text-xs font-medium px-2 py-0.5 rounded-full; }
    {% for s, c in STATUS_COLORS.items() %}
    .status-{{ s }} { background:{{ c }}; color:{{ c|replace('#','')|int(base=16) > 0x888888 ? '#1f2937' : '#ffffff' }}; }
    {% endfor %}
    .status-not_interested { opacity:0.7; }

    /* Source filter pills — neutral pill, blue when selected. Same for every source. */
    .source-pill {
      display:inline-block;
      padding: 2px 10px;
      border-radius: 9999px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #475569;
    }
    .peer:checked ~ .source-pill,
    .source-pill-on {
      background: #2563eb;
      border-color: #2563eb;
      color: #ffffff;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-white border-b sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="text-lg font-semibold">🏠 Apartment Hunter</a>
      <nav class="text-sm flex items-center gap-4">
        {% set _qs = request.query_string.decode() %}
        <a href="/{% if _qs %}?{{ _qs }}{% endif %}" class="text-slate-500 hover:text-slate-900">Listings</a>
        <a href="/map{% if _qs %}?{{ _qs }}{% endif %}" class="text-slate-500 hover:text-slate-900">Map</a>
        <a href="/config" class="text-slate-500 hover:text-slate-900">⚙ Criteria</a>
        {% include "_scrape_button.html" %}
      </nav>
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
