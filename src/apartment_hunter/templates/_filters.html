<form method="get" class="bg-white rounded-lg border p-4 mb-4 space-y-3">
  <div class="flex flex-wrap items-center gap-2">
    <input
      type="text" name="q" value="{{ search }}" placeholder="Search title / address / notes…"
      class="flex-1 min-w-[200px] px-3 py-2 border rounded-md text-sm"
    >
    <select name="sort" class="px-3 py-2 border rounded-md text-sm">
      <option value="score_desc"  {% if sort=='score_desc'%}selected{% endif %}>Sort: score ↓</option>
      <option value="price_asc"   {% if sort=='price_asc' %}selected{% endif %}>Sort: price ↑</option>
      <option value="price_desc"  {% if sort=='price_desc'%}selected{% endif %}>Sort: price ↓</option>
      <option value="newest"      {% if sort=='newest'    %}selected{% endif %}>Sort: newest</option>
    </select>
    <button class="px-4 py-2 bg-slate-900 text-white text-sm rounded-md">Apply</button>
  </div>

  <div class="flex flex-wrap items-center gap-3 text-sm">
    <input type="number" name="max_price" value="{{ max_price }}" placeholder="Max $"
           class="w-24 px-2 py-1 border rounded">
    <input type="number" step="0.5" name="min_beds" value="{{ min_beds }}" placeholder="Min beds"
           class="w-24 px-2 py-1 border rounded">
    <input type="number" step="1" min="0" max="100" name="min_score" value="{{ min_score|num }}" placeholder="Min score"
           class="w-24 px-2 py-1 border rounded">
    <input type="number" step="1" min="0" max="100" name="max_score" value="{{ max_score }}" placeholder="Max score"
           class="w-24 px-2 py-1 border rounded">
    <label class="text-xs text-slate-600 flex items-center gap-1">
      <input type="checkbox" name="starred" value="1" {% if starred_only %}checked{% endif %}>
      ★ Starred only
    </label>
    <label class="text-xs text-slate-600 flex items-center gap-1">
      <input type="checkbox" name="hidden" value="1" {% if show_hidden %}checked{% endif %}>
      Show hidden
    </label>
    <label class="text-xs text-slate-600 flex items-center gap-1"
           title="Listings below your min_rent in Criteria — likely scams, room shares, or per-week prices">
      <input type="checkbox" name="nonviable" value="1" {% if show_nonviable %}checked{% endif %}>
      Show non-viable{% if criteria_min_rent %} (&lt; ${{ criteria_min_rent }}){% endif %}
    </label>
  </div>

  <div class="flex flex-wrap gap-2 text-xs">
    <span class="text-slate-500 self-center">Status:</span>
    {% for s in statuses %}
      <label class="cursor-pointer">
        <input type="checkbox" name="status" value="{{ s }}" class="hidden peer"
               {% if s in status_filter %}checked{% endif %}>
        <span class="status-pill status-{{ s }} peer-checked:ring-2 peer-checked:ring-slate-900">
          {{ s }} · {{ status_counts.get(s, 0) }}
        </span>
      </label>
    {% endfor %}
  </div>

  <div class="flex flex-wrap gap-2 text-xs">
    <span class="text-slate-500 self-center">Source:</span>
    {% for src, c in source_counts.items() %}
      <label class="cursor-pointer">
        <input type="checkbox" name="source" value="{{ src }}" class="hidden peer"
               {% if src in source_filter %}checked{% endif %}>
        <span class="source-pill">
          {{ src }} · {{ c }}
        </span>
      </label>
    {% endfor %}
  </div>
</form>
